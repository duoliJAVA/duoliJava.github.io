# Site settings
title: 多力
SEOTitle: 多力的博客 | DL Blog
header-img: img/home-bg-o.jpg
email: duoli.java@gmail.com
description: "一些技术积累，一些个人思考."
keyword: "多力, DL, 多力的博客, java, 技术博客"
url: "http://duolijava.github.io"          # your host, for absolute URL
baseurl: ""      # for example, '/blog' if your blog hosted on 'host/blog'
github_repo: "https://github.com/duoliJAVA/duoliJava.github.io" # you code repository

# Sidebar settings
sidebar: true                           # whether or not using Sidebar.
sidebar-about-description: ""
sidebar-avatar: /img/about-me.png      # use absolute URL, seeing it's used in both `/` and `/about/`



# SNS settings
RSS: false
# weibo_username:     qiubaiying
# zhihu_username:     
# github_username:    
# facebook_username:  
# jianshu_username:   
#twitter_username:   qiubaiying




# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
permalink: pretty
paginate: 10
exclude: ["less","node_modules","Gruntfile.js","package.json","README.md"]
anchorjs: true                          # if you want to customize anchor. check out line:181 of `post.html`



# Gems
# from PR#40, to support local preview for Jekyll 3.0
gems: [jekyll-paginate]




# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM                            # use Github Flavored Markdown !important



# 评论系统
# Disqus（https://disqus.com/）
# disqus:
#   enable: true
#   username: duolijava-github-io
github:
  username: duoliJava 
# Gitalk
gitalk:
  enable: true    #是否开启Gitalk评论
  clientID: Ov23liioxVzsZDS411SN                            #生成的clientID
  clientSecret: 4c695f25a5d5ada29517d1f22cea75ea2c01b689    #生成的clientSecret
  repo: duoliJava.github.io  #仓库名称
  owner: duoliJAVA    #github用户名
  admin: duoliJAVA
  distractionFreeMode: true #是否启用类似FB的阴影遮罩
  perPage: 10  # 每页显示的评论数量
  language: "zh-CN"  # 可以设置成中文
  authorization: true  # 启用 GitHub 授权
  callback: "duoliJava.github.io"


# 统计

# Analytics settings
# Baidu Analytics
ba_track_id: b50bf2b12b5338a1845e33832976fd68

# Google Analytics
ga_track_id: 'UA-90855596-1'            # Format: UA-xxxxxx-xx
ga_domain: auto            # 默认的是 auto, 这里我是自定义了的域名，你如果没有自己的域名，需要改成auto





# Featured Tags
featured-tags: true                     # 是否使用首页标签
featured-condition-size: 1              # 相同标签数量大于这个数，才会出现在首页



# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: true



